<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pisuke Josjis - Landing Page</title>
    <link rel="stylesheet" href="css6.css">
</head>
<body>

    <nav>
        <div class="logo">
            <img src="img/logo.png" alt="Logo">
        </div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Menu</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-1">
            <h1>Lumer di <span class="teks-oren">Mulut</span>,<br>Nagih di <span class="teks-oren">Hati!</span></h1>
            <p>Rasakan sensasi pisang pilihan berbalut kulit renyah dengan isian coklat premium yang melimpah.</p>
            <div class="hero-buttons">
                <button class="btn-pesan">Pesan Sekarang</button>
            </div>
        </div>
    </header>

    <section class="menu-section">
        <p class="sub-judul">Paling Laris</p>
        <h2>Menu Favorit</h2>
        
        <div class="menu-container">
            <div class="menu-pisang">
                <div class="img-box">
                    <img src="img/g2.png" alt="Produk 1">
                </div>
                <h4>Pisang Coklat Lumer</h4>
                <p class="price">Rp 15.000</p>
                <button class="btn-keranjang">🛒</button>
            </div>

            <div class="menu-pisang">
                <div class="img-box">
                    <img src="img/g3.png" alt="Produk 2">
                </div>
                <h4>Pisang Mix Varian</h4>
                <p class="price">Rp 15.000</p>
                <button class="btn-keranjang">🛒</button>
            </div>

            <div class="menu-pisang">
                <div class="img-box">
                    <img src="img/g4.png" alt="Produk 3">
                </div>
                <h4>Pisang Keju Susu</h4>
                <p class="price">Rp 15.000</p>
                <button class="btn-keranjang">🛒</button>
            </div>
        </div>
    </section>

    <footer>
        <p><strong>Pisuke Josjis</strong> - 2026</p>
    </footer>
</body>
</html>
